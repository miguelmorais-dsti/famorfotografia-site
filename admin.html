<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Famorfotografia</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #fafafa; --text: #1a1a1a; --accent: #8e735b; }
    body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); padding: 4rem 2rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 2rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.05); table-layout: fixed; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    th { background: #f5f5f5; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem; }
    td.multiline { white-space: normal; line-height: 1.4; }
    .col-date { width: 100px; }
    .col-client { width: 180px; }
    .col-service { width: 150px; }
    .col-event { width: 110px; }
    .col-contact { width: 220px; }
    .col-message { width: auto; }
    .status-new { color: var(--accent); font-weight: 700; }
    #login-screen { text-align: center; padding-top: 10vh; }
    input[type="password"] { padding: 0.8rem; border: 1px solid #ddd; width: 300px; margin-bottom: 1rem; }
    .btn { background: var(--text); color: #fff; border: none; padding: 0.8rem 2rem; cursor: pointer; font-weight: 600; }
    #admin-content { display: none; }
  </style>
</head>
<body>
  <div class="container" id="login-screen">
    <h1>Acesso Restrito</h1>
    <input type="password" id="admin-pass" placeholder="Palavra-passe">
    <br>
    <button class="btn" onclick="checkPass()">Entrar</button>
  </div>

  <div class="container" id="admin-content">
    <h1>Pedidos de Reserva</h1>
    <table id="inquiries-table">
      <thead>
        <tr>
          <th class="col-date">Data Pedido</th>
          <th class="col-client">Cliente</th>
          <th class="col-service">Serviço</th>
          <th class="col-event">Data Evento</th>
          <th class="col-contact">Contacto/Local</th>
          <th class="col-message">Mensagem</th>
        </tr>
      </thead>
      <tbody id="inquiries-list">
        <!-- Pedidos serão inseridos aqui -->
      </tbody>
    </table>
  </div>

  <script>
    async function checkPass() {
      const pass = document.getElementById('admin-pass').value;
      const response = await fetch('/api/admin/inquiries', {
        headers: { 'Authorization': pass }
      });

      if (response.ok) {
        const data = await response.json();
        renderInquiries(data);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
      } else {
        alert('Password incorreta');
      }
    }

    function renderInquiries(list) {
      const tbody = document.getElementById('inquiries-list');
      tbody.innerHTML = list.reverse().map(item => `
        <tr>
          <td>${new Date(item.submittedAt).toLocaleDateString()}</td>
          <td class="multiline"><strong>${item.name}</strong><br>${item.partnerName || ''}</td>
          <td class="multiline">
            <strong>${item.serviceType || 'Não especificado'}</strong><br>
            <small>${item.packageType || 'Sem pacote'}</small>
          </td>
          <td>${item.eventDate}</td>
          <td class="multiline">${item.email}<br>${item.phone || ''}<br><small>📍 ${item.location || '-'}</small></td>
          <td class="multiline" title="${item.message || ''}">${item.message || '-'}</td>
        </tr>
      `).join('');
    }
  </script>

</html>
